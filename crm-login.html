<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CRM Login | SilverMoon Fitness Studio</title>
    <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#D9FD50', dark: '#0A0A0A' }, fontFamily: { heading: ['Orbitron', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }</script>
    <style> .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); } body { background-color: #0A0A0A; color: #FFFFFF; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; } h1 { font-family: 'Orbitron', sans-serif; } </style>
</head>
<body class="p-6 flex flex-col items-center justify-center min-h-screen">
    <div class="w-full max-w-md glass p-10 text-center mb-10">
        <a href="index.html" class="text-3xl font-heading font-black tracking-tighter flex items-center justify-center gap-2 mb-12 uppercase">
            <span class="text-primary italic">SILVERMOON</span>
            <span class="font-light tracking-widest text-[10px] border-l border-white/20 pl-2 text-primary uppercase">Studio</span>
        </a>
        <h1 class="text-2xl font-bold uppercase mb-8 tracking-widest">Portal Access</h1>
        
        <form class="space-y-6 text-left" onsubmit="event.preventDefault(); window.location.href='crm-dashboard.html';">
            <div>
                <label class="block text-[10px] uppercase tracking-widest font-bold text-gray-500 mb-2">Staff ID / Email</label>
                <input type="text" value="admin@silvermoon.fit" class="w-full bg-white/5 border border-white/10 p-4 outline-none focus:border-primary transition-colors text-sm">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-widest font-bold text-gray-500 mb-2">Password</label>
                <input type="password" value="••••••••" class="w-full bg-white/5 border border-white/10 p-4 outline-none focus:border-primary transition-colors text-sm">
            </div>
            <button type="submit" class="w-full py-4 bg-primary text-dark font-black uppercase tracking-widest hover:shadow-[0_0_20px_rgba(217,253,80,0.3)] transition-all mt-4">
                Enter Dashboard
            </button>
        </form>
        
        <p class="mt-8 text-[10px] uppercase tracking-widest text-gray-600">Authorized Personnel Only</p>
    </div>

    <!-- Mini Footer for Socials -->
    <div class="flex gap-6 opacity-50 hover:opacity-100 transition-opacity">
        <a href="#" class="w-11 h-11 glass flex items-center justify-center hover:bg-primary hover:text-dark transition-all rounded-full border border-white/10 hover:border-primary shadow-[0_0_20px_rgba(217,253,80,0.1)] hover:shadow-[0_0_30px_rgba(217,253,80,0.4)] group">
            <i data-lucide="instagram" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
        </a>
        <a href="#" class="w-11 h-11 glass flex items-center justify-center hover:bg-primary hover:text-dark transition-all rounded-full border border-white/10 hover:border-primary shadow-[0_0_20px_rgba(217,253,80,0.1)] hover:shadow-[0_0_30px_rgba(217,253,80,0.4)] group">
            <i data-lucide="youtube" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
        </a>
        <a href="#" class="w-11 h-11 glass flex items-center justify-center hover:bg-primary hover:text-dark transition-all rounded-full border border-white/10 hover:border-primary shadow-[0_0_20px_rgba(217,253,80,0.1)] hover:shadow-[0_0_30px_rgba(217,253,80,0.4)] group">
            <i data-lucide="twitter" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
        </a>
        <a href="#" class="w-11 h-11 glass flex items-center justify-center hover:bg-primary hover:text-dark transition-all rounded-full border border-white/10 hover:border-primary shadow-[0_0_20px_rgba(217,253,80,0.1)] hover:shadow-[0_0_30px_rgba(217,253,80,0.4)] group">
            <i data-lucide="message-circle" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
        </a>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
